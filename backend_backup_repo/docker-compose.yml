version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: boutique_db
    restart: always
    environment:
      POSTGRES_USER: boutique_user
      POSTGRES_PASSWORD: boutique_password
      POSTGRES_DB: boutique_saas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: boutique_backend
    restart: always
    environment:
      DATABASE_URL: postgres://boutique_user:boutique_password@db:5432/boutique_saas
      JWT_SECRET: dreamy_secret_sparkle_123
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/public/images:/app/public/images
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: boutique_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
